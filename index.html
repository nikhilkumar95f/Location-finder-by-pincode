<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Code Location Finder</title>
    <!-- Yeh Leaflet library ka CSS hai jo map ke styling ke liye use hota hai -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Enter Pin Code to Find Location</h1>
        <input type="text" id="pincode" placeholder="Enter 6-digit pin code" maxlength="6">
        <div id="results"></div>
    </div>
    <!-- Yeh Leaflet library ka JavaScript hai jo map functionality provide karta hai -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
